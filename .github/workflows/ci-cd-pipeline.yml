name: CI/CD Pipeline

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  # ============================================================
  # JOB 1: Bygg och testa koden
  # Triggas på varje push/PR till main
  # ============================================================
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Make mvnw executable
        run: chmod +x ./mvnw

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run unit tests
        run: ./mvnw test

      - name: Build JAR (verify everything compiles)
        run: ./mvnw package -DskipTests


  # ============================================================
  # JOB 2: Bygg och pusha Docker-image till Docker Hub
  # Körs bara på push till main (inte på PRs)
  # Beror på att build-and-test lyckas först
  # ============================================================
  build-and-push-docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test          # Kör bara om testerna går igenom
    if: github.event_name == 'push' # Inte på pull_request

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Make mvnw executable
        run: chmod +x ./mvnw

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR for Docker
        run: ./mvnw package -DskipTests

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Taggar med både 'latest' och commit-SHA för spårbarhet
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ai-reliability-proxy:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/ai-reliability-proxy:${{ github.sha }}

      # Simulerat deployment-steg (webhook/notification)
      - name: Notify deployment (simulated)
        run: |
          echo "✅ Image pushed: ${{ secrets.DOCKERHUB_USERNAME }}/ai-reliability-proxy:${{ github.sha }}"
          echo "🚀 Deployment step would trigger here (webhook, Render, Railway etc.)"