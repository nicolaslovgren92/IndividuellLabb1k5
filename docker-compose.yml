version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: individuelllabb1k5-app
    ports:
      - "8080:8080"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      APP_API_KEY: ${APP_API_KEY}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/ai"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

